name: Rebuild site

on:
   schedule:
      - cron: '0 */6 * * *'
   workflow_dispatch:

jobs:
   rebuild:
      runs-on: ubuntu-latest
      steps:
         - name: Trigger Cloudflare Pages deploy hook
           env:
              DEPLOY_HOOK_URL: ${{ secrets.CF_PAGES_DEPLOY_HOOK_URL }}
           run: curl --fail-with-body -sS -X POST "$DEPLOY_HOOK_URL"
